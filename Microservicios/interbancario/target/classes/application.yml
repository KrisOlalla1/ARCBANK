server:
  port: 8085

spring:
  application:
    name: micro-interbancario

  datasource:
    url: jdbc:postgresql://localhost:5432/db_interbancaria
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none   # No crear ni borrar tablas, usar las existentes
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
